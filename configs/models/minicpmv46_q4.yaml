model:
  name: minicpmv46-q4
  family: MiniCPM-V 4.6
  backend: llama.cpp
  model_ref: openbmb/MiniCPM-V-4.6-gguf
  quantization: Q4_K_M

server:
  base_url: http://127.0.0.1:8080/v1
  host: 127.0.0.1
  port: 8080

runtime:
  launch_mode: prequantized_gguf_with_mmproj
  ctx_size: 512
  n_gpu_layers: 0
  model_path_env: MODEL_PATH
  mmproj_path_env: MMPROJ_PATH
  wsl_script: scripts/wsl/run_minicpmv46_llama.sh
  jetson_script: scripts/jetson/run_minicpmv46_llama_docker.sh

capabilities:
  text: true
  image: true
  audio: false

notes:
  status: Uses pre-built Q4_K_M GGUF model and F16 mmproj artifacts from openbmb/MiniCPM-V-4.6-gguf. WSL CUDA text and sample-image benchmark passed with ctx_size 512, N_GPU_LAYERS 32, LLAMA_BATCH_SIZE 128, LLAMA_UBATCH_SIZE 32, and one server slot after using the official pre-built files. Jetson runtime remains unverified.
