model:
  name: minicpmv46-q4
  family: MiniCPM-V 4.6
  backend: llama.cpp
  model_ref: openbmb/MiniCPM-V-4_6
  quantization: Q4_K_M

server:
  base_url: http://127.0.0.1:8080/v1
  host: 127.0.0.1
  port: 8080

runtime:
  launch_mode: local_gguf_with_mmproj
  ctx_size: 512
  n_gpu_layers: 0
  model_path_env: MODEL_PATH
  mmproj_path_env: MMPROJ_PATH
  wsl_script: scripts/wsl/run_minicpmv46_llama.sh
  jetson_script: scripts/jetson/run_minicpmv46_llama_docker.sh

capabilities:
  text: true
  image: true
  audio: false

notes:
  status: Unverified low-memory WSL template. Metadata-only inspection found 2.44 GiB of known HF files, model.safetensors at 2600957528 bytes, and local llama.cpp MiniCPM-V 4.6 conversion signals, but local conversion/runtime has not been observed in this repository.
