model:
  name: gemma4-e2b-it-q8
  family: Gemma 4
  backend: llama.cpp
  model_ref: ggml-org/gemma-4-E2B-it-GGUF
  quantization: Q8_0

server:
  base_url: http://127.0.0.1:8080/v1
  host: 127.0.0.1
  port: 8080

runtime:
  launch_mode: local_gguf_with_mmproj
  ctx_size: 512
  n_gpu_layers: 0
  model_path_env: MODEL_PATH
  mmproj_path_env: MMPROJ_PATH
  wsl_script: scripts/wsl/run_gemma4_e2b_llama.sh
  jetson_script: scripts/jetson/run_gemma4_e2b_llama_docker.sh

capabilities:
  text: true
  image: true
  audio: false

notes:
  status: WSL baseline using official pre-quantized Q8_0 GGUF artifacts. Text-only CPU fallback smoke passed with ctx_size 512, N_GPU_LAYERS 0, and one server slot. WSL CUDA text and sample-image benchmark passed with ctx_size 512, N_GPU_LAYERS 32, LLAMA_BATCH_SIZE 512, LLAMA_UBATCH_SIZE 512, and one server slot. Jetson Q8 runtime remains unverified; the observed Jetson Gemma path is the Q4 config.
