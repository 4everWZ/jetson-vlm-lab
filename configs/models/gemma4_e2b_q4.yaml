model:
  name: gemma4-e2b-it-q4
  family: Gemma 4
  backend: llama.cpp
  model_ref: ggml-org/gemma-4-E2B-it-GGUF
  quantization: Q4_K_M

server:
  base_url: http://127.0.0.1:8080/v1
  host: 127.0.0.1
  port: 8080

runtime:
  launch_mode: external_or_high_memory_quantized_gguf
  ctx_size: 1024
  n_gpu_layers: 0
  model_path_env: MODEL_PATH
  mmproj_path_env: MMPROJ_PATH
  wsl_script: scripts/wsl/run_gemma4_e2b_llama.sh
  jetson_script: scripts/jetson/run_gemma4_e2b_llama_docker.sh

capabilities:
  text: true
  image: true
  audio: false

notes:
  status: High-memory or externally prepared Q4 template. Local BF16-to-Q4 quantization was observed to exceed this WSL memory budget; use gemma4_e2b_q8.yaml as the WSL baseline.
