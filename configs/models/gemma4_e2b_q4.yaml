model:
  name: gemma4-e2b-it-q4
  family: Gemma 4
  backend: llama.cpp
  model_ref: mradermacher/gemma-4-E2B-it-GGUF
  quantization: Q4_K_M

server:
  base_url: http://127.0.0.1:8080/v1
  host: 127.0.0.1
  port: 8080

runtime:
  launch_mode: prequantized_gguf_with_mmproj
  ctx_size: 512
  n_gpu_layers: 0
  model_path_env: MODEL_PATH
  mmproj_path_env: MMPROJ_PATH
  wsl_script: scripts/wsl/run_gemma4_e2b_llama.sh
  jetson_script: scripts/jetson/run_gemma4_e2b_llama_docker.sh

capabilities:
  text: true
  image: true
  audio: false

notes:
  status: Uses pre-quantized Q4_K_M GGUF artifacts downloaded from mradermacher/gemma-4-E2B-it-GGUF. Local BF16-to-Q4 and Q8-to-Q4 quantization are not part of the WSL baseline on this memory-constrained host.
